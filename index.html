<!DOCTYPE html>
<html>
<head>
  <title>Boris Room Dashboard</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<h1>Temperature and humidity in Boris' room</h1>

<div class="cards">

  <div class="card">
    <h2>Temperature</h2>
    <div id="temp" class="value">-- °C</div>
  </div>

  <div class="card">
    <h2>Humidity</h2>
    <div id="hum" class="value">-- %</div>
  </div>

</div>

<div class="chart-box">
  <canvas id="chart"></canvas>
</div>

<script src="app.js"></script>

</body>
</html>
