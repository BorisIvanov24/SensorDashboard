<!DOCTYPE html>
<html>
<head>
  <title>ESP32 Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

  <h1>🌡 ESP32 IoT Dashboard</h1>

  <div class="card">
    <h2>Temperature</h2>
    <div id="temp" class="value">-- °C</div>
  </div>

  <div class="card">
    <h2>Humidity</h2>
    <div id="hum" class="value">-- %</div>
  </div>

  <p class="status">Live data from ThingSpeak</p>

</div>

<script src="app.js"></script>

</body>
</html>
