<!DOCTYPE html>
<html lang="bg">
<head>
  <meta charset="UTF-8">
  <title>Стаята на Борис</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="bg-grid"></div>

  <header>
    <div class="header-inner">
      <div class="header-label">МОНИТОРИНГ НА СТАЯТА</div>
      <h1>Стаята на <span class="accent">Борис</span></h1>
      <p class="subtitle">Температура &amp; Влажност · На живо</p>
    </div>
  </header>

  <main>

    <section class="cards">

      <div class="card" id="card-temp">
        <div class="card-tag">🌡 ТЕМПЕРАТУРА</div>
        <div id="temp" class="value">--</div>
        <div class="unit">°C</div>
        <div class="updated-label">Обновено: <span id="temp-ago">—</span></div>
      </div>

      <div class="card" id="card-hum">
        <div class="card-tag">💧 ВЛАЖНОСТ</div>
        <div id="hum" class="value">--</div>
        <div class="unit">%</div>
        <div class="updated-label">Обновено: <span id="hum-ago">—</span></div>
      </div>

    </section>

    <section class="chart-section">
      <div class="chart-header">
        <span class="chart-title">История на данните</span>
        <span class="chart-badge">последни 8000 записа</span>
      </div>
      <div class="chart-wrap">
        <canvas id="chart"></canvas>
      </div>
    </section>

  </main>

  <script src="app.js"></script>
</body>
</html>
